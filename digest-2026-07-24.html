<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdTech Daily Digest</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Serif:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
:root{
  --teal:#17a394; --teal-d:#0e7a6e; --teal-br:#23c4b1; --teal-wash:#e4f4f1; --teal-line:#bfe5df;
  --ink:#1b2a31; --ink-2:#243640; --ink-3:#2d424d;
  --slate:#5d6f76; --slate-l:#8a9aa0;
  --bg:#f4f7f7; --surface:#ffffff; --line:#e6ecec; --line-2:#d6dfdf;
  --amber-t:#9a6206; --amber-w:#f8eedb;
  --fd:'Roboto Serif',serif; --fb:'Roboto',system-ui,sans-serif; --fm:'Roboto',system-ui,sans-serif;
  --r:14px; --r-md:10px; --r-sm:7px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--fb);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
h1,h2,h3,h4{font-family:var(--fd);font-weight:600;margin:0;letter-spacing:-.01em;color:var(--ink)}
.mono{font-family:var(--fm)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

.stage{max-width:1280px;margin:0 auto}
.brandmark{display:inline-flex;align-items:center;gap:9px;font-family:var(--fd);font-weight:400;font-size:14px;color:var(--slate)}
.brandmark b{font-weight:600}
.logo-node{width:30px;height:30px;border-radius:8px;border:2px solid var(--teal);background:#ecfdf5;display:grid;place-items:center;color:var(--teal-d);position:relative}
.logo-node::before,.logo-node::after{content:"";position:absolute;width:5px;height:5px;border-radius:50%;background:var(--teal)}
.logo-node::before{left:-3px;top:50%;transform:translateY(-50%)}
.logo-node::after{right:-3px;top:50%;transform:translateY(-50%)}

.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--fm);font-size:11px;letter-spacing:.02em;padding:5px 11px;border-radius:999px;background:var(--surface);border:1px solid var(--line-2);color:var(--slate);white-space:nowrap}
.chip i{font-size:13px;color:var(--teal-d)}
.tag{font-family:var(--fm);font-size:9.5px;letter-spacing:.08em;font-weight:700;padding:2px 6px;border-radius:4px}
.tag-new{background:var(--teal-wash);color:var(--teal-d)}
.tag-old{background:#eef2f2;color:var(--slate-l)}
.tag-lvl{background:#eef2f2;color:var(--slate)}
.date{font-family:var(--fm);font-size:11px;color:var(--slate-l);letter-spacing:.02em}

.reveal{opacity:0;transform:translateY(10px);transition:opacity .5s ease,transform .5s ease}
.reveal.in{opacity:1;transform:none}

/* ============================================================= ATLAS */
.atlas{padding:0 0 80px}
.atlas .cover{padding:54px 32px 30px;border-bottom:1px solid var(--line-2);position:relative;background:
  radial-gradient(circle at 12px 12px, var(--teal-line) 1.4px, transparent 1.5px) 0 0/26px 26px;
  background-color:var(--surface)}
.atlas .cover .inner{max-width:1100px;margin:0 auto}
.atlas .cover .brandmark{font-size:14px;color:var(--slate)}
.atlas .cover h1{font-size:clamp(34px,6vw,62px);line-height:1.02;letter-spacing:-.03em;margin:22px 0 0;max-width:14ch}
.atlas .cover .thesis{font-size:19px;color:var(--ink-2);margin-top:18px;max-width:60ch;line-height:1.55}
.atlas .cover .thesis b{color:var(--teal-d);font-weight:600}
.atlas .cover .dateline{font-family:var(--fm);font-size:12px;color:var(--slate);margin-top:20px;letter-spacing:.03em}

.atlas .body{max-width:1100px;margin:0 auto;padding:0 32px}
.atlas .sections{padding:50px 0 0}
.tsection{padding:30px 0 46px;border-bottom:1px solid var(--line);scroll-margin-top:20px}
.tsection:last-child{border-bottom:0}
.tsection .head{display:flex;gap:18px;align-items:flex-start}
.tsection .tnum{width:54px;height:54px;border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;font-family:var(--fd);font-weight:600;font-size:22px;flex:none;position:relative}
.tsection .tnum i{position:absolute;bottom:-6px;right:-6px;width:24px;height:24px;border-radius:50%;background:var(--teal);color:#fff;display:grid;place-items:center;font-size:12px;border:3px solid var(--bg)}
.tsection .htxt h2{font-size:27px;letter-spacing:-.02em}
.tsection .htxt p{margin:8px 0 0;font-size:15.5px;color:var(--slate);line-height:1.65;max-width:64ch}
.tsection .htxt p b{color:var(--ink);font-weight:600}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px;margin-top:24px;padding-left:72px}
.tgrid .tcard{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:15px 16px;transition:.15s}
.tgrid .tcard:hover{border-color:var(--teal-line);transform:translateY(-2px)}
.tgrid .src{font-family:var(--fm);font-size:10.5px;color:var(--slate-l);letter-spacing:.03em;display:flex;align-items:center;gap:6px;margin-bottom:7px}
.tgrid .src i{color:var(--teal-d);font-size:13px}
.tgrid h4{font-family:var(--fb);font-size:14.5px;line-height:1.35;font-weight:600}
.tgrid .tcardlink:hover h4{color:var(--teal-d)}
.tgrid p{margin:6px 0 0;font-size:12.5px;color:var(--slate);line-height:1.5}
.tgrid .cardmeta{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:9px}
.atlas .foot{max-width:1100px;margin:30px auto 0;padding:22px 32px 0;border-top:1px solid var(--line-2);font-family:var(--fm);font-size:11.5px;color:var(--slate-l);line-height:1.8}

/* atlas+ illustrated hero */
.cover2-grid{display:grid;grid-template-columns:1fr minmax(260px,40%);gap:44px;align-items:center}
.cover2{border-bottom-left-radius:var(--r);border-bottom-right-radius:var(--r)}
.cover2 .illus{display:flex;justify-content:center;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:22px}
.atlas2-topbar{background:var(--ink-2);color:#b7c6ca;font-family:var(--fm);font-size:12px;letter-spacing:.06em;padding:12px max(32px, (100% - 1100px) / 2)}
.cover2 .illus svg,.cover2 .illus img{width:100%;max-width:400px;height:auto;display:block}
.cover2 .illus img{border-radius:12px}
.cover2 .covertext h1{font-size:clamp(32px,4.6vw,56px);line-height:1.02;letter-spacing:-.03em;margin:16px 0 0;max-width:13ch}
.cover2 .covertext .theme-range{font-family:var(--fm);font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--teal-d);font-weight:700;margin-top:14px}
.cover2 .covertext .thesis{font-size:18px;color:var(--ink-2);margin-top:12px;max-width:52ch;line-height:1.55}
.cover2 .covertext .thesis b{color:var(--teal-d);font-weight:600}
.cover2 .covertext .dateline{font-family:var(--fm);font-size:12px;color:var(--slate);margin-top:18px;letter-spacing:.03em}
.atlas2 .body{grid-template-columns:1fr;max-width:none;padding:0}
.atlas2 .tgrid{padding-left:0}
.atlas2 .sections{padding-top:0}
/* daily "today's focus" band (text-only; the hero is weekly) */
.todayfocus{display:flex;align-items:center;gap:14px;margin:26px max(32px, (100% - 1100px) / 2) 0;padding:14px 20px;background:var(--teal-wash);border:1px solid var(--teal-line);border-radius:var(--r-md)}
.todayfocus .tf-ic{flex:none;width:34px;height:34px;border-radius:8px;background:var(--surface);border:1px solid var(--teal-line);display:grid;place-items:center;color:var(--teal-d);font-size:18px}
.todayfocus .tf-txt{min-width:0}
.todayfocus .tf-kick{font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-d);font-weight:700}
.todayfocus .tf-title{font-weight:700;color:var(--ink);font-size:15px;margin-top:1px}
.todayfocus .tf-body{color:var(--slate);font-size:13px;line-height:1.45;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.atlas2-bar{padding:30px max(32px, (100% - 1100px) / 2) 18px;text-align:center}
.atlas2-toggle{display:inline-flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--line-2);border-radius:999px;padding:4px}
.atlas2-toggle .tg-label{font-family:var(--fm);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--slate-l);padding:0 8px;line-height:1;position:relative;top:0}
.atlas2-toggle .tg{font-family:var(--fm);font-size:12px;color:var(--slate);background:none;border:0;border-radius:999px;padding:6px 16px;cursor:pointer;transition:background .14s,color .14s}
.atlas2-toggle .tg:hover{color:var(--ink)}
.atlas2-toggle .tg.on{background:var(--teal);color:#fff}
.atlas2-toggle .tg:focus-visible{outline:2px solid var(--teal-br);outline-offset:2px}
.tnum-src{font-size:18px;letter-spacing:.03em}
.atlas2 .tsection{border:1px solid var(--line-2);border-radius:var(--r);background:var(--surface);padding:44px max(32px, (100% - 1100px) / 2) 44px;margin-bottom:18px}
.atlas2 .htxt p{max-width:none}
.atlas2 .tsection:last-child{border:1px solid var(--line-2);margin-bottom:0}

@media(max-width:860px){
  .atlas .body{padding:0 18px}
  .tgrid{padding-left:0}
  .atlas .cover{padding:40px 18px 26px}
  .cover2-grid{grid-template-columns:1fr;gap:18px}
  .cover2 .illus{order:2;max-width:300px;margin:4px auto 0}
  .cover2 .covertext{order:1}
}
@media(prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
  .reveal{opacity:1;transform:none}
  html{scroll-behavior:auto}
}
</style>
</head>

      <div class="todayfocus">
        <span class="tf-ic"><i class="ti ti-flag-2"></i></span>
        <span class="tf-txt">
          <span class="tf-kick">Today&rsquo;s focus</span>
          <div class="tf-title">${DATA.headline}</div>
          <div class="tf-body">${DATA.thesis}</div>
        </span>
      </div>
      <div class="atlas2-bar">
        <div class="atlas2-toggle" role="group" aria-label="Group articles by">
          <span class="tg-label">View by</span>
          <button class="tg ${atlasView === 'theme' ? 'on' : ''}" type="button" data-view="theme">Theme</button>
          <button class="tg ${atlasView === 'source' ? 'on' : ''}" type="button" data-view="source">Source</button>
        </div>
      </div>
      <div class="sections" id="atlas2-sections">${atlas2SectionsHTML()}</div>
    </div>
    <div class="foot">${FOOTNOTE}</div>
  </section>`;
}

/* ---------- wiring ---------- */
const stage = document.getElementById('stage');

function observe(){
  if (matchMedia('(prefers-reduced-motion:reduce)').matches){
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('in')); return;
  }
  const io = new IntersectionObserver(es => {
    es.forEach(e => { if (e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
  }, { rootMargin: '0px 0px -8% 0px' });
  document.querySelectorAll('.reveal').forEach((el, i) => { el.style.transitionDelay = Math.min(i * 22, 220) + 'ms'; io.observe(el); });
}

function wireAtlas2(){
  const toggle = stage.querySelector('.atlas2-toggle');
  if (!toggle) return;
  toggle.addEventListener('click', e => {
    const b = e.target.closest('.tg'); if (!b) return;
    const v = b.dataset.view;
    if (v === atlasView) return;
    atlasView = v;
    toggle.querySelectorAll('.tg').forEach(x => x.classList.toggle('on', x.dataset.view === v));
    stage.querySelector('#atlas2-sections').innerHTML = atlas2SectionsHTML();
  });
}

document.title = `EdTech Daily Digest — ${DATA.dateLabel}`;
stage.innerHTML = renderAtlas2();
observe();
wireAtlas2();
</script>
</body>
</html>
