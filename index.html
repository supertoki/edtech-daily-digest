<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdTech Daily Digest — Archive</title>
  <style>
    :root {
      --primary: #1a56db;
      --primary-light: #e8effc;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid var(--primary);
    }
    header h1 { font-size: 2rem; font-weight: 700; color: var(--primary); }
    header p { font-size: 1rem; color: var(--text-muted); margin-top: 0.25rem; }
    .digest-list { list-style: none; }
    .digest-list li {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.6rem;
      transition: box-shadow 0.15s;
    }
    .digest-list li:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .digest-list a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      text-decoration: none;
      color: var(--text);
    }
    .digest-list .date { font-weight: 600; color: var(--primary); }
    .digest-list .arrow { color: var(--text-muted); font-size: 1.2rem; }
    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 3rem 0;
    }
    footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>EdTech Daily Digest</h1>
      <p>Daily education technology research from 11 curated sources</p>
    </header>

    <ul class="digest-list">
      <!-- DIGEST_ENTRIES -->
      <li><a href="digest-2026-03-22.html"><span class="date">March 22, 2026</span><span class="arrow">&rarr;</span></a></li>
    </ul>

    <footer>
      <p>EdTech Daily Digest &mdash; Automated research powered by Claude</p>
    </footer>
  </div>
</body>
</html>
