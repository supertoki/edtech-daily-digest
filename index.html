<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdTech Daily Digest — Archive</title>
  <style>
    :root {
      --primary: #3d4f5f;
      --primary-light: #eef2f4;
      --bg: #f5f6f7;
      --card-bg: #ffffff;
      --text: #3d4f5f;
      --text-muted: #5a6f7e;
      --border: #dde3e7;
      --yellow: #ffd600;
      --teal: #2ec4a5;
      --dark-teal: #2e5e5a;
      --sage: #7ba5a0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding: 1.5rem 0;
      border-bottom: 3px solid var(--yellow);
      background: var(--primary);
      border-radius: 8px;
      margin-top: -2rem;
      padding-top: 2rem;
    }
    header .logo { width: 80px; height: 80px; margin: 0 auto 0.75rem; }
    header h1 { font-size: 2rem; font-weight: 700; color: #ffffff; }
    header p { font-size: 1rem; color: var(--yellow); margin-top: 0.25rem; }
    .digest-list { list-style: none; }
    .digest-list li {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.6rem;
      transition: box-shadow 0.15s;
    }
    .digest-list li:hover {
      box-shadow: 0 2px 8px rgba(46,94,90,0.12);
      border-left: 3px solid var(--teal);
    }
    .digest-list a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      text-decoration: none;
      color: var(--text);
    }
    .digest-list .date { font-weight: 600; color: var(--dark-teal); }
    .digest-list .arrow { color: var(--teal); font-size: 1.2rem; }
    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 3rem 0;
    }
    footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <img src="edtech.png" alt="EdTech Daily Digest" width="80" height="80">
      </div>
      <h1>EdTech Daily Digest</h1>
      <p>Daily education technology research from 11 curated sources</p>
    </header>

    <footer>

</body>
</html>
